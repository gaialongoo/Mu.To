<!DOCTYPE html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ArtAround Marketplace</title>
    <link rel="icon" type="image/jpeg" href="/img/logo.jpg" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Raleway:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
      [x-cloak] { display: none !important; }
      .skip-to-main {
        position: absolute;
        left: -9999px;
        z-index: 100000;
        padding: 12px 18px;
        background: var(--green, #5cbf80);
        color: #0d0d0d;
        font-family: Cinzel, serif;
        font-size: 11px;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        text-decoration: none;
        border-radius: 4px;
      }
      .skip-to-main:focus {
        left: 12px;
        top: 12px;
        outline: 2px solid #fff;
        outline-offset: 2px;
      }
    </style>
  </head>
  <body>
    <a class="skip-to-main" href="#marketplace-main">Salta al contenuto principale</a>

    <div x-data="marketplace" x-cloak>
      <!-- guard: verifica auth in corso -->
      <main class="mp-guard" x-show="!authChecked" x-cloak x-text="mp('authChecking')"></main>

      <!-- guard: nessun museo selezionato -->
      <main class="mp-guard mp-guard-col" x-show="authChecked && !MUSEO" x-cloak>
        <p class="mp-guard-msg" x-text="mp('noMuseo')"></p>
        <a class="mp-btn-green-outline" href="/" x-text="mp('backHome')"></a>
      </main>

      <main id="marketplace-main" class="mp-page" :aria-label="mp('ariaMainMarketplace')" tabindex="-1"
            x-show="authChecked && MUSEO" x-cloak>
        <div class="mp-shell">

          <!-- ── HEADER ─────────────────────────────────────────── -->
          <header class="mp-header">
            <div class="mp-brand">
              <div class="mp-brand-logo"><img src="/img/logo.jpg" alt="ArtAround logo" /></div>
              <span class="mp-brand-name" x-text="mp('marketplaceTitle')"></span>
            </div>

            <div class="mp-museum">
              <p class="mp-museum-label" x-text="mp('selectedMuseum')"></p>
              <p class="mp-museum-name" x-text="MUSEO"></p>
            </div>

            <div class="mp-actions">
              <button class="mp-btn-outline" @click="openProfile()" x-text="mp('profile')"></button>
              <a class="mp-btn-green-outline" href="/" x-text="mp('home')"></a>
              <template x-if="apiKeyActive">
                <span class="mp-key-active">
                  <span class="mp-key-active-txt" x-text="mp('keyActive')"></span>
                  <button class="mp-btn-outline" @click="logoutApiKey()" x-text="mp('removeKey')"></button>
                </span>
              </template>
            </div>
          </header>

          <!-- ── TAB NAV ────────────────────────────────────────── -->
          <nav class="mp-nav" :aria-label="mp('ariaMarketplaceNav')">
            <div class="mp-tabs">
              <button class="mp-tab" :class="{ 'is-active': activeTab === 'items' }"
                      @click="switchSection('items')" x-text="mp('tabItems')"></button>
              <button class="mp-tab" :class="{ 'is-active': activeTab === 'visits' }"
                      @click="switchSection('visits')" x-text="mp('tabPaths')"></button>
            </div>
            <button class="mp-btn-green-outline" x-show="activeTab === 'visits' && isProfessor"
                    @click="openTeacherBuilder()" x-text="mp('createClassPath')"></button>
          </nav>

          <!-- ── FILTRI (solo tab oggetti) ──────────────────────── -->
          <div class="mp-filters" x-show="activeTab === 'items'" x-cloak>
            <input type="text" class="mp-filter-input mp-filter-grow" x-model="search"
                   @keydown.enter="applyFilters()" :placeholder="mp('searchPlaceholder')" />
            <select class="mp-filter-input" x-model="stanzaFilter">
              <option value="" x-text="mp('allRooms')"></option>
              <template x-for="s in stanze" :key="s">
                <option :value="s" x-text="displayStanzaName(s)"></option>
              </template>
            </select>
            <select class="mp-filter-input" x-model="autoreFilter">
              <option value="" x-text="mp('allAuthors')"></option>
              <template x-for="a in autori" :key="a"><option :value="a" x-text="a"></option></template>
            </select>
            <select class="mp-filter-input" x-model="correnteFilter">
              <option value="" x-text="mp('allMovements')"></option>
              <template x-for="c in correntiArtistiche" :key="c"><option :value="c" x-text="c"></option></template>
            </select>
            <div class="mp-filter-year">
              <input type="number" min="1" class="mp-filter-input" x-model="yearFrom" :placeholder="mp('yearFromPh')" />
              <select class="mp-filter-input" x-model="yearFromEra">
                <option value="ac" x-text="mp('eraBC')"></option>
                <option value="dc" x-text="mp('eraAD')"></option>
              </select>
            </div>
            <div class="mp-filter-year">
              <input type="number" min="1" class="mp-filter-input" x-model="yearTo" :placeholder="mp('yearToPh')" />
              <select class="mp-filter-input" x-model="yearToEra">
                <option value="ac" x-text="mp('eraBC')"></option>
                <option value="dc" x-text="mp('eraAD')"></option>
              </select>
            </div>
            <button class="mp-btn-green-outline" @click="applyFilters()" x-text="mp('filter')"></button>
            <button class="mp-btn-outline" @click="resetFilters()" x-text="mp('reset')"></button>
          </div>

          <!-- ── TAB: catalogo oggetti ──────────────────────────── -->
          <section x-show="activeTab === 'items'" x-cloak>
            <div class="mp-grid">
              <template x-if="loadingItems">
                <template x-for="i in 6" :key="i"><div class="mp-skeleton"></div></template>
              </template>
              <template x-if="!loadingItems && pagedItems.length === 0">
                <div class="mp-empty"><p x-text="mp('noItemsFound')"></p></div>
              </template>
              <template x-if="!loadingItems">
                <template x-for="(o, i) in pagedItems" :key="o.nome + '::' + (o.stanza || i)">
                  <article class="mp-card">
                    <div class="mp-card-img">
                      <img :src="previewSrc(o)" :alt="o.nome" @error="$el.style.display='none'" />
                    </div>
                    <div class="mp-card-body">
                      <div class="mp-card-title" x-text="o.nome"></div>
                      <div class="mp-card-meta">
                        <span x-text="(Array.isArray(o.descrizioni)?o.descrizioni.length:0) + ' desc · ' + (Array.isArray(o.connessi)?o.connessi.length:0) + ' connessi'"></span>
                      </div>
                      <div class="mp-card-attrs">
                        <span x-text="'Autore: ' + (o.autore || 'N/D')"></span>
                        <span x-text="'Anno: ' + (o.anno || 'N/D')"></span>
                      </div>
                      <div class="mp-tags">
                        <template x-if="o.stanza">
                          <span class="mp-tag mp-tag-room" x-text="displayStanzaName(o.stanza) || o.stanza"></span>
                        </template>
                        <template x-for="c in (o.connessi || []).slice(0, 2)" :key="c">
                          <span class="mp-tag mp-tag-green" x-text="c"></span>
                        </template>
                        <template x-if="(o.connessi ? o.connessi.length : 0) > 2">
                          <span class="mp-tag mp-tag-green" x-text="'+' + (o.connessi.length - 2)"></span>
                        </template>
                      </div>
                    </div>
                    <div class="mp-card-foot">
                      <div class="mp-card-price" x-show="!isTextObject(o)">
                        Prezzo: <span x-text="priceLabel(o) || '—'"></span>
                      </div>
                      <div class="mp-card-actions">
                        <button class="mp-card-btn mp-card-btn-ghost" @click="openItemDetails(o)">Visualizza</button>
                        <button class="mp-card-btn mp-card-btn-buy"
                                x-show="!isTextObject(o)"
                                :disabled="purchaseDisabled(o)"
                                @click="requestObjectPurchase(o)"
                                x-text="purchaseLabel(o)"></button>
                      </div>
                    </div>
                  </article>
                </template>
              </template>
            </div>
            <nav class="mp-pagination" :aria-label="mp('ariaPagination')" x-show="itemPages > 1">
              <template x-for="p in itemPages" :key="p">
                <button class="mp-page-btn" :class="{ 'is-active': p === itemPage }"
                        @click="itemPage = p" x-text="p"></button>
              </template>
            </nav>
          </section>

          <!-- ── TAB: visite ────────────────────────────────────── -->
          <section x-show="activeTab === 'visits'" x-cloak>

            <!-- pannello IA -->
            <div class="mp-ai-panel">
              <p class="mp-ai-kicker" x-text="mp('aiRouteTitle')"></p>
              <p class="mp-ai-hint" x-text="mp('aiRouteHint')"></p>
              <p class="mp-ai-hint" x-text="mp('aiRouteWhatIs')"></p>
              <div class="mp-ai-actions">
                <button class="mp-btn-green-outline" :disabled="generatingAiRoute"
                        @click="showAiGenerateModal = true"
                        x-text="generatingAiRoute ? mp('aiRouteGenerating') : mp('aiRouteGenerate')"></button>
              </div>
              <div class="mp-ai-routes" x-show="personalRoutes.length > 0">
                <p class="mp-ai-routes-label" x-text="mp('aiMyRoutes')"></p>
                <template x-for="r in personalRoutes" :key="r.id">
                  <div class="mp-ai-route-row">
                    <span x-text="r.nome"></span>
                    <button class="mp-mini-btn" @click="deleteAiRoute(r.id)" x-text="mp('aiRouteDelete')"></button>
                  </div>
                </template>
              </div>
            </div>

            <!-- visite guidate salvate (professore) -->
            <div class="mp-ai-panel" x-show="isProfessor && teacherSavedVisits.length > 0">
              <p class="mp-ai-kicker" x-text="mp('myGuidedTours')"></p>
              <div class="mp-saved-visits">
                <template x-for="visit in teacherSavedVisits.slice(0, 6)" :key="visit.id">
                  <div class="mp-saved-visit-row">
                    <span class="mp-saved-visit-name" x-text="visit.nome"></span>
                    <div class="mp-saved-visit-actions">
                      <button class="mp-mini-btn" @click="copyToClipboard(visitStudentLink(visit), mp('linkStudentsCopied'))" x-text="mp('linkStudents')"></button>
                      <button class="mp-mini-btn mp-mini-green" @click="window.open(visitDashboardLink(visit), '_blank', 'noopener,noreferrer')" x-text="mp('startVisit')"></button>
                      <button class="mp-mini-btn" x-show="!visit.navigationStarted" @click="startEditTeacherVisit(visit)" x-text="mp('edit')"></button>
                      <button class="mp-mini-btn mp-mini-danger" @click="deleteTeacherVisit(visit.id)" x-text="mp('delete')"></button>
                    </div>
                  </div>
                </template>
              </div>
            </div>

            <!-- griglia percorsi -->
            <div class="mp-grid">
              <template x-if="loadingVisits">
                <template x-for="i in 6" :key="i"><div class="mp-skeleton"></div></template>
              </template>
              <template x-if="!loadingVisits && pagedVisits.length === 0">
                <div class="mp-empty"><p x-text="mp('noPathsCreated')"></p></div>
              </template>
              <template x-if="!loadingVisits">
                <template x-for="(p, i) in pagedVisits" :key="p.id || p.nome">
                  <div class="mp-card mp-visit-card">
                    <div class="mp-card-body">
                      <div class="mp-card-title" x-text="displayPercorsoNome(p.nome) || p.nome"></div>
                      <div class="mp-visit-meta">
                        <span class="mp-visit-count" x-text="(p.oggetti || []).length + ' ' + mp('worksCount')"></span>
                        <span class="mp-visit-price" :class="{ 'mp-green': visitIncluded(p) }" x-text="fmtPrezzo(p.prezzo)"></span>
                      </div>
                      <div class="mp-tags">
                        <template x-for="n in (p.oggetti || []).slice(0, 3)" :key="n">
                          <span class="mp-tag mp-tag-green" x-text="n"></span>
                        </template>
                        <template x-if="(p.oggetti ? p.oggetti.length : 0) > 3">
                          <span class="mp-tag mp-tag-green" x-text="'+' + (p.oggetti.length - 3)"></span>
                        </template>
                      </div>
                    </div>
                    <div class="mp-card-foot">
                      <div class="mp-visit-actions">
                        <button class="mp-card-btn mp-card-btn-ghost" :disabled="!canAccessPath(p)" @click="openPathDetails(p)" x-text="mp('view')"></button>
                        <button class="mp-card-btn" :class="visitCanStart(p) ? 'mp-card-btn-start' : 'mp-card-btn-ghost'"
                                :disabled="!visitCanStart(p)" @click="startNavigatorForRoute(p)" x-text="mp('startRoute')"></button>
                        <button class="mp-card-btn mp-card-btn-buy" x-show="visitShowBuy(p)"
                                :disabled="buyingPath === p.nome" @click="requestBuyPath(p)"
                                x-text="buyingPath === p.nome ? mp('buying') : mp('buy')"></button>
                      </div>
                    </div>
                  </div>
                </template>
              </template>
            </div>
            <nav class="mp-pagination" :aria-label="mp('ariaPagination')" x-show="visitPages > 1">
              <template x-for="p in visitPages" :key="p">
                <button class="mp-page-btn" :class="{ 'is-active': p === visitPage }"
                        @click="visitPage = p" x-text="p"></button>
              </template>
            </nav>
          </section>

        </div>
      </main>

      <!-- ── TOAST ──────────────────────────────────────────────── -->
      <div class="mp-toast" :class="{ 'is-error': toast.type === 'error', 'is-shown': toast.show }"
           x-text="toast.msg" aria-live="polite"></div>

      <!-- ── MODALE API KEY ─────────────────────────────────────── -->
      <div class="mp-modal-overlay" x-show="modalOpen" x-cloak
           @click.self="modalOpen = false" @keydown.escape.window="modalOpen = false">
        <div class="mp-modal" role="dialog" aria-modal="true">
          <div class="mp-modal-rule"></div>
          <button class="mp-modal-x" @click="modalOpen = false" aria-label="Chiudi">✕</button>
          <h3 class="mp-modal-title">
            <small>Autenticazione</small>
            API Key
          </h3>
          <div style="margin-bottom:22px">
            <label class="mp-field-label">X-API-Key</label>
            <input type="password" class="mp-input" x-model="apiKeyDraft"
                   @keydown.enter="confirmApiKey()" placeholder="Inserisci la chiave API" />
          </div>
          <button class="mp-btn-primary" @click="confirmApiKey()">Conferma</button>
          <div class="mp-modal-info">
            <strong>INFO</strong><br />
            Inviata come header <code>X-API-Key</code> tramite proxy su <code>/api</code>.<br />
            Non viene persistita oltre la sessione.
          </div>
        </div>
      </div>

      <!-- ── MODALE PROFILO ─────────────────────────────────────── -->
      <div class="mp-overlay" x-show="profileOpen" x-cloak
           @click.self="closeProfile()" @keydown.escape.window="closeProfile()">
        <div class="mp-dialog mp-dialog-profile" role="dialog" aria-modal="true">
          <button class="mp-dialog-x" @click="closeProfile()">×</button>
          <p class="mp-dialog-kicker" x-text="mp('account')"></p>
          <h3 class="mp-dialog-title" x-text="mp('profileTitle')"></h3>
          <form class="mp-profile-form" @submit.prevent="saveProfile()">
            <div class="mp-builder-row2">
              <input class="mp-input" x-model="profileForm.nome" :placeholder="mp('phFirstName')" />
              <input class="mp-input" x-model="profileForm.cognome" :placeholder="mp('phLastName')" />
            </div>
            <div class="mp-builder-row2">
              <input class="mp-input mp-input-disabled" x-model="profileForm.email" disabled :placeholder="mp('phEmail')" />
              <input class="mp-input" type="number" min="1" max="120" x-model="profileForm.eta" :placeholder="mp('phAge')" />
            </div>
            <div class="mp-builder-row2">
              <select class="mp-input" x-model="profileForm.livello">
                <option value="" x-text="mp('levelPlaceholder')"></option>
                <option value="bambino" x-text="mp('lvlChild')"></option>
                <option value="studente" x-text="mp('lvlStudent')"></option>
                <option value="esperto" x-text="mp('lvlExpert')"></option>
                <option value="avanzato" x-text="mp('lvlAdvanced')"></option>
              </select>
              <select class="mp-input" x-model="profileForm.durata">
                <option value="" x-text="mp('durationExpl')"></option>
                <option value="corto" x-text="mp('durOptShort')"></option>
                <option value="medio" x-text="mp('durOptMed')"></option>
                <option value="lungo" x-text="mp('durOptLong')"></option>
                <option value="esteso" x-text="mp('durOptExt')"></option>
              </select>
            </div>
            <div>
              <p class="mp-profile-section" x-text="mp('langLabel')"></p>
              <select class="mp-input mp-profile-lang" x-model="profileForm.navLang" @change="onProfileLangChange()">
                <template x-for="opt in LANG_OPTIONS" :key="opt.value">
                  <option :value="opt.value" x-text="opt.label"></option>
                </template>
              </select>
            </div>
            <div>
              <p class="mp-profile-section" x-text="mp('interests')"></p>
              <div class="mp-interests">
                <template x-for="pair in PROFILE_INTERESTS" :key="pair[0]">
                  <button type="button" class="mp-interest"
                          :class="{ 'is-on': profileForm.interessi.includes(pair[0]) }"
                          @click="toggleInterest(pair[0])" x-text="pair[1]"></button>
                </template>
              </div>
            </div>
            <div class="mp-profile-actions">
              <button type="button" class="mp-btn-outline" @click="closeProfile()" x-text="mp('close')"></button>
              <button type="submit" class="mp-btn-green-outline" x-text="mp('saveProfile')"></button>
            </div>
          </form>
        </div>
      </div>

      <!-- ── MODALE DETTAGLIO OGGETTO ───────────────────────────── -->
      <div class="mp-overlay" x-show="selectedItem" x-cloak
           @click.self="closeItemModal()" @keydown.escape.window="closeItemModal()">
        <div class="mp-dialog" role="dialog" aria-modal="true" x-show="selectedItem">
          <button class="mp-dialog-x" @click="closeItemModal()">×</button>
          <p class="mp-dialog-kicker" x-text="mp('itemLabel')"></p>
          <h3 class="mp-dialog-title" x-text="selectedItem?.nome"></h3>

          <div class="mp-item-buy" x-show="!isTextObject(selectedItem)">
            <button class="mp-card-btn mp-card-btn-buy" :disabled="purchaseDisabled(selectedItem)"
                    @click="requestObjectPurchase(selectedItem)" x-text="purchaseLabel(selectedItem)"></button>
          </div>

          <div class="mp-dialog-stack">
            <!-- dettagli -->
            <div class="mp-panel" x-show="!isTextObject(selectedItem)">
              <p class="mp-panel-label" x-text="mp('details')"></p>
              <div class="mp-detail-grid">
                <p><strong x-text="mp('room')"></strong> <span x-text="(selectedItem?.stanza && displayStanzaName(selectedItem.stanza)) || mp('nd')"></span></p>
                <p><strong x-text="mp('connected')"></strong> <span x-text="(selectedItem?.connessi || []).join(', ') || mp('none')"></span></p>
                <p><strong x-text="mp('author')"></strong> <span x-text="selectedItem?.autore || mp('nd')"></span></p>
                <p><strong x-text="mp('artMovement')"></strong> <span x-text="selectedItem?.correnteArtistica || mp('nd')"></span></p>
                <p><strong x-text="mp('license')"></strong> <span x-text="selectedItem?.licenza || mp('nd')"></span></p>
                <p><strong x-text="mp('year')"></strong> <span x-text="selectedItem?.anno || mp('nd')"></span></p>
                <p><strong x-text="mp('price')"></strong> <span class="mp-green" x-text="fmtEuro(selectedItem?.prezzo)"></span></p>
              </div>
            </div>

            <!-- descrizioni -->
            <div class="mp-panel">
              <p class="mp-panel-label" x-text="mp('descriptions')"></p>
              <template x-if="preferredDescription?.text">
                <p class="mp-desc-text" x-text="preferredDescription.text"></p>
              </template>
              <template x-if="!preferredDescription?.text">
                <p class="mp-desc-text" x-text="mp('noDescription')"></p>
              </template>
              <button class="mp-card-btn mp-card-btn-ghost mp-desc-toggle"
                      @click="showAllDescriptions = !showAllDescriptions"
                      x-text="showAllDescriptions ? mp('hideAll') : mp('showAll')"></button>
              <div class="mp-desc-table-wrap" x-show="showAllDescriptions" x-cloak>
                <table class="mp-desc-table">
                  <thead>
                    <tr>
                      <th x-text="mp('tableLevelLength')"></th>
                      <template x-for="len in DESCRIPTION_LENGTHS" :key="len"><th x-text="len"></th></template>
                    </tr>
                  </thead>
                  <tbody>
                    <template x-for="(lvlLabel, lvlIndex) in DESCRIPTION_LEVELS" :key="lvlLabel">
                      <tr>
                        <td x-text="lvlLabel"></td>
                        <template x-for="(lenLabel, lenIndex) in DESCRIPTION_LENGTHS" :key="lenLabel">
                          <td x-text="descCell(lvlIndex, lenIndex)"></td>
                        </template>
                      </tr>
                    </template>
                  </tbody>
                </table>
              </div>
            </div>

            <!-- gallery -->
            <div class="mp-panel" x-show="!isTextObject(selectedItem) && galleryImages.length > 0">
              <p class="mp-panel-label" x-text="mp('imageGallery')"></p>
              <div class="mp-gallery">
                <img class="mp-gallery-main" :src="galleryImgSrc(galleryActiveImage)"
                     :alt="(selectedItem?.nome || '') + ' ' + (galleryActiveImage?.tipo || '')" />
                <div class="mp-gallery-nav">
                  <button class="mp-gallery-arrow" @click="galleryPrev()">‹</button>
                  <div class="mp-gallery-thumbs">
                    <template x-for="(img, index) in galleryImages" :key="img.tipo">
                      <button class="mp-gallery-thumb" :class="{ 'is-active': index === galleryActiveIndex }"
                              @click="selectedGalleryIndex = index">
                        <img :src="galleryImgSrc(img)" :alt="(selectedItem?.nome || '') + ' thumb'" />
                      </button>
                    </template>
                  </div>
                  <button class="mp-gallery-arrow" @click="galleryNext()">›</button>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- ── MODALE DETTAGLIO PERCORSO ──────────────────────────── -->
      <div class="mp-overlay" x-show="selectedPath" x-cloak
           @click.self="closePathModal()" @keydown.escape.window="closePathModal()">
        <div class="mp-dialog mp-dialog-narrow" role="dialog" aria-modal="true" x-show="selectedPath">
          <button class="mp-dialog-x" @click="closePathModal()">×</button>
          <p class="mp-dialog-kicker" x-text="mp('pathLabel')"></p>
          <h3 class="mp-dialog-title" x-text="displayPercorsoNome(selectedPath?.nome)"></h3>
          <p class="mp-path-price">
            <span x-text="mp('price')"></span>
            <span class="mp-green" x-text="fmtPrezzo(selectedPath?.prezzo)"></span>
          </p>
          <div class="mp-panel">
            <p class="mp-panel-label" x-text="mp('pathWorksOrder')"></p>
            <ol class="mp-path-list">
              <template x-for="name in (selectedPath?.oggetti || [])" :key="name">
                <li>
                  <span class="mp-path-name" x-text="name"></span>
                  <span class="mp-path-room" x-text="pathObjectRoom(name)"></span>
                </li>
              </template>
            </ol>
          </div>
        </div>
      </div>

      <!-- ── MODALE CONFERMA ACQUISTO PERCORSO ──────────────────── -->
      <div class="mp-overlay" x-show="pathPurchaseConfirm" x-cloak
           @click.self="if (!buyingPath) pathPurchaseConfirm = null">
        <div class="mp-confirm" role="dialog" aria-modal="true" x-show="pathPurchaseConfirm">
          <button class="mp-dialog-x" :disabled="!!buyingPath" @click="if (!buyingPath) pathPurchaseConfirm = null">×</button>
          <p class="mp-dialog-kicker" x-text="mp('pathPurchaseConfirmTitle')"></p>
          <h3 class="mp-confirm-title" x-text="displayPercorsoNome(pathPurchaseConfirm?.nome) || pathPurchaseConfirm?.nome"></h3>
          <p class="mp-confirm-body"
             x-text="mp('pathPurchaseConfirmBody').replace('{name}', displayPercorsoNome(pathPurchaseConfirm?.nome) || pathPurchaseConfirm?.nome || '').replace('{price}', fmtPrezzo(pathPurchaseConfirm?.prezzo))"></p>
          <div class="mp-confirm-actions">
            <button class="mp-mini-btn" :disabled="!!buyingPath" @click="pathPurchaseConfirm = null" x-text="mp('pathPurchaseCancel')"></button>
            <button class="mp-btn-primary mp-btn-inline" :disabled="!!buyingPath" @click="confirmBuyPath()"
                    x-text="buyingPath === (pathPurchaseConfirm && pathPurchaseConfirm.nome) ? mp('buying') : mp('pathPurchaseConfirm')"></button>
          </div>
        </div>
      </div>

      <!-- ── MODALE GENERAZIONE VISITA IA ───────────────────────── -->
      <div class="mp-overlay" x-show="showAiGenerateModal" x-cloak
           @click.self="showAiGenerateModal = false" @keydown.escape.window="showAiGenerateModal = false">
        <div class="mp-ai-modal" role="dialog" aria-modal="true">
          <button class="mp-dialog-x" @click="showAiGenerateModal = false">×</button>
          <p class="mp-dialog-kicker" x-text="mp('aiRouteTitle')"></p>
          <h3 class="mp-ai-modal-title" x-text="mp('aiRouteGenerate')"></h3>
          <p class="mp-ai-modal-desc" x-text="mp('aiRouteWhatIs')"></p>
          <input class="mp-input mp-mb10" x-model="aiRouteNameDraft" :placeholder="mp('aiRouteNamePh')" />
          <label class="mp-field-label" x-text="mp('aiLenLabel')"></label>
          <select class="mp-input mp-mb12" x-model="aiLengthPreset">
            <option value="breve" x-text="mp('aiLenShort')"></option>
            <option value="medio" x-text="mp('aiLenMedium')"></option>
            <option value="lungo" x-text="mp('aiLenLong')"></option>
          </select>
          <p class="mp-ai-modal-note" x-text="mp('aiLenExplain')"></p>
          <label class="mp-field-label" x-text="mp('aiConstraintsLabel')"></label>
          <textarea class="mp-input mp-textarea" x-model="aiConstraints" rows="4" maxlength="600"
                    :placeholder="mp('aiConstraintsPh')"></textarea>
          <p class="mp-ai-modal-note" x-text="mp('aiConstraintsHelp')"></p>
          <div class="mp-confirm-actions">
            <button class="mp-mini-btn" @click="showAiGenerateModal = false">Annulla</button>
            <button class="mp-btn-green-outline" :disabled="generatingAiRoute" @click="generateAiRoute()"
                    x-text="generatingAiRoute ? (mp('aiRouteGenerating') + ' ⏳') : mp('aiRouteGenerate')"></button>
          </div>
        </div>
      </div>

      <!-- ── MODALE TEACHER BUILDER (visite guidate) ────────────── -->
      <div class="mp-overlay" x-show="teacherBuilderOpen" x-cloak
           @click.self="closeTeacherBuilder()" @keydown.escape.window="closeTeacherBuilder()">
        <div class="mp-dialog mp-dialog-builder" role="dialog" aria-modal="true">
          <button class="mp-dialog-x" @click="closeTeacherBuilder()">×</button>
          <p class="mp-dialog-kicker" x-text="mp('professor')"></p>
          <h3 class="mp-dialog-title" x-text="teacherEditingVisitId ? mp('editGuidedClass') : mp('createGuidedClass')"></h3>

          <input class="mp-input mp-mb12" x-model="teacherVisitName" :placeholder="mp('phVisitName')" />

          <div class="mp-builder-row2">
            <select class="mp-input" x-model="teacherLevel">
              <option value="bambino" x-text="mp('lvlChild')"></option>
              <option value="studente" x-text="mp('lvlStudent')"></option>
              <option value="esperto" x-text="mp('lvlExpert')"></option>
              <option value="avanzato" x-text="mp('lvlAdvanced')"></option>
            </select>
            <select class="mp-input" x-model="teacherDuration">
              <option value="corto" x-text="mp('durOptShort')"></option>
              <option value="medio" x-text="mp('durOptMed')"></option>
              <option value="lungo" x-text="mp('durOptLong')"></option>
              <option value="esteso" x-text="mp('durOptExt')"></option>
            </select>
          </div>

          <p class="mp-builder-hint"
             x-text="mp('selectObjectsHint') + ' ' + teacherSelectedObjects.length + ' ' + mp('selectedCount') + '.'"></p>
          <div class="mp-builder-objects">
            <template x-for="obj in allOggetti" :key="obj.nome">
              <button type="button" class="mp-obj-btn"
                      :class="{ 'is-on': teacherSelectedObjects.includes(obj.nome) }"
                      @click="toggleTeacherObject(obj.nome)" x-text="obj.nome"></button>
            </template>
          </div>

          <!-- ordine + descrizioni -->
          <div class="mp-builder-block" x-show="teacherSelectedObjects.length > 0">
            <p class="mp-builder-label" x-text="mp('orderAndDesc')"></p>
            <template x-for="objName in teacherSelectedObjects" :key="'desc-' + objName">
              <div class="mp-builder-card">
                <div class="mp-builder-card-head">
                  <strong x-text="objName"></strong>
                  <div class="mp-builder-card-moves">
                    <button type="button" class="mp-mini-btn" @click="moveTeacherObject(objName, -1)" x-text="mp('up')"></button>
                    <button type="button" class="mp-mini-btn" @click="moveTeacherObject(objName, 1)" x-text="mp('down')"></button>
                  </div>
                </div>
                <textarea class="mp-input mp-input-dark mp-builder-textarea"
                          x-model="teacherObjectDescriptions[objName]"
                          :placeholder="mp('phDescFor') + ' ' + objName"></textarea>
              </div>
            </template>
          </div>

          <!-- item testo -->
          <div class="mp-builder-block">
            <p class="mp-builder-label" x-text="mp('textItemSection')"></p>
            <select class="mp-input mp-input-dark mp-mb8" x-model="teacherTextDraft.room"
                    @change="teacherTextDraft.insertAfterObject = ''">
              <option value="" x-text="mp('selectRoomOpt')"></option>
              <template x-for="room in availableTextRooms" :key="room"><option :value="room" x-text="room"></option></template>
            </select>
            <select class="mp-input mp-input-dark mp-mb8" x-model="teacherTextDraft.insertAfterObject">
              <option value="" x-text="mp('selectObjectRoom')"></option>
              <template x-for="objName in availableInsertAfterObjects" :key="'after-' + objName">
                <option :value="objName" x-text="mp('afterObject') + ' ' + objName"></option>
              </template>
            </select>
            <p class="mp-builder-faint" x-text="mp('textItemHint')"></p>
            <input class="mp-input mp-input-dark mp-mb8" x-model="teacherTextDraft.name" :placeholder="mp('phTextItemName')" />
            <textarea class="mp-input mp-input-dark mp-builder-textarea mp-mb8" x-model="teacherTextDraft.text" :placeholder="mp('phTextItemBody')"></textarea>
            <button type="button" class="mp-btn-green-outline mp-btn-inline" @click="addTeacherTextItem()"
                    x-text="teacherEditingTextItemId ? mp('saveTextItem') : mp('addTextItem')"></button>
            <div class="mp-builder-textlist" x-show="teacherTextItems.length > 0">
              <template x-for="item in teacherTextItems" :key="item.id">
                <div class="mp-builder-textrow">
                  <span x-text="textItemSummary(item)"></span>
                  <div class="mp-builder-card-moves">
                    <button type="button" class="mp-mini-btn" @click="editTeacherTextItem(item.id)" x-text="mp('edit')"></button>
                    <button type="button" class="mp-mini-btn" @click="removeTeacherTextItem(item.id)" x-text="mp('remove')"></button>
                  </div>
                </div>
              </template>
            </div>
          </div>

          <!-- quiz -->
          <div class="mp-builder-block">
            <p class="mp-builder-label" x-text="mp('quizBlockTitle')"></p>
            <input class="mp-input mp-input-dark" x-model="teacherQuizTitle" :placeholder="mp('quizTitlePh')" />
            <input class="mp-input mp-input-dark" type="number" min="10" x-model.number="teacherQuizTimeLimit" :placeholder="mp('timeLimitSec')" />
            <template x-for="(question, qIdx) in teacherQuizQuestions" :key="question.id">
              <div class="mp-quiz-q">
                <div class="mp-quiz-q-head">
                  <span class="mp-green" x-text="mp('questionLabel') + ' ' + (qIdx + 1)"></span>
                  <button type="button" class="mp-mini-btn" @click="removeQuizQuestion(question.id)" x-text="mp('remove')"></button>
                </div>
                <input class="mp-input mp-input-darker mp-mb8" x-model="question.question" :placeholder="mp('questionTextPh')" />
                <template x-for="(option, optIdx) in question.options" :key="optIdx">
                  <div class="mp-quiz-opt">
                    <input class="mp-input mp-input-darker" x-model="question.options[optIdx]" :placeholder="mp('optionPh') + ' ' + (optIdx + 1)" />
                    <button type="button" class="mp-mini-btn" @click="quizRemoveOption(question, optIdx)">X</button>
                  </div>
                </template>
                <div class="mp-quiz-q-foot">
                  <button type="button" class="mp-mini-btn" @click="quizAddOption(question)" x-text="mp('addOption')"></button>
                  <select class="mp-input mp-input-darker mp-quiz-correct" x-model.number="question.correctIndex">
                    <template x-for="(option, idx) in question.options" :key="idx">
                      <option :value="idx" x-text="mp('correctIsOption') + ' ' + (idx + 1)"></option>
                    </template>
                  </select>
                </div>
              </div>
            </template>
            <button type="button" class="mp-btn-green-outline mp-btn-inline" @click="addQuizQuestion()" x-text="mp('addQuestion')"></button>
          </div>

          <div class="mp-builder-save">
            <button type="button" class="mp-btn-outline" @click="saveTeacherGuidedVisit()"
                    x-text="teacherEditingVisitId ? mp('saveVisitChanges') : mp('saveGuidedVisitBtn')"></button>
          </div>

          <p class="mp-builder-flow" x-show="teacherOptimizedOrder.length > 0">
            <span x-text="mp('visitFlowFinal')"></span>
            <span class="mp-green" x-text="teacherOptimizedOrder.join(' -> ')"></span>
          </p>
          <input class="mp-input mp-input-dark mp-builder-link" x-show="teacherStudentLink" readonly :value="teacherStudentLink" />
          <input class="mp-input mp-input-dark mp-builder-link" x-show="teacherDashboardLink" readonly :value="teacherDashboardLink" />
        </div>
      </div>

    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
