openapi: 3.0.3

info:
  title: Sistema Musei API
  description: API completa per consultare, creare, aggiornare e cancellare musei, oggetti, percorsi, layout grafici e immagini
  version: 2.3.0

servers:
  - url: https://localhost:3000
    description: Server locale di sviluppo

components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key

  schemas:
    ImmagineInfo:
      type: object
      properties:
        tipo:
          type: string
          description: "'preview' oppure un numero intero (es. '1', '2', '3')"
          example: "preview"
        url:
          type: string
          description: URL relativo per accedere all'immagine
          example: "/musei/Uffizi/oggetti/Venere/immagini/preview"
        size:
          type: integer
          description: Dimensione del file in byte
          example: 204800
        updatedAt:
          type: string
          format: date-time
          example: "2024-06-01T12:00:00Z"

security:
  - ApiKeyAuth: []

paths:

  /musei:
    get:
      summary: Lista dei musei
      description: Ritorna un array con i nomi di tutti i musei
      responses:
        '200':
          description: Lista dei musei
          content:
            application/json:
              schema:
                type: object
                properties:
                  musei:
                    type: array
                    items:
                      type: string
                    example: ["Uffizi", "Museo Egizio", "Museo di Torino"]

    post:
      summary: Crea un nuovo museo
      description: Aggiunge un nuovo museo al sistema
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - nome
                - citta
              properties:
                nome:
                  type: string
                  example: "Museo di Storia Naturale"
                citta:
                  type: string
                  example: "Roma"
                oggetti:
                  type: array
                  items:
                    type: object
                    properties:
                      nome:
                        type: string
                      stanza:
                        type: string
                      connessi:
                        type: array
                        items:
                          type: string
                      descrizioni:
                        type: array
                        items:
                          type: array
                          items:
                            type: string
                percorsi:
                  type: array
                  items:
                    type: object
                    properties:
                      nome:
                        type: string
                      oggetti:
                        type: array
                        items:
                          type: string
      responses:
        '201':
          description: Museo creato con successo
        '400':
          description: Errore nei dati inviati o museo già esistente

  /musei/{nome_museo}:
    get:
      summary: Leggi un museo
      description: Ritorna il JSON completo di un museo
      parameters:
        - in: path
          name: nome_museo
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Museo trovato
          content:
            application/json:
              schema:
                type: object
                properties:
                  nome:
                    type: string
                  citta:
                    type: string
                  oggetti:
                    type: array
                    items:
                      type: object
                      properties:
                        nome:
                          type: string
                        stanza:
                          type: string
                        connessi:
                          type: array
                          items:
                            type: string
                        descrizioni:
                          type: array
                          items:
                            type: array
                            items:
                              type: string
                  percorsi:
                    type: array
                    description: Percorsi statici del museo
                    items:
                      type: object
                      properties:
                        nome:
                          type: string
                        oggetti:
                          type: array
                          items:
                            type: string
        '404':
          description: Museo non trovato

    put:
      summary: Aggiorna un museo
      description: Modifica i dati di un museo esistente
      parameters:
        - in: path
          name: nome_museo
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                nome:
                  type: string
                citta:
                  type: string
      responses:
        '200':
          description: Museo aggiornato con successo
        '404':
          description: Museo non trovato

    delete:
      summary: Cancella un museo
      description: Rimuove un museo e tutti i suoi oggetti
      parameters:
        - in: path
          name: nome_museo
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Museo eliminato
        '404':
          description: Museo non trovato

  /musei/{nome_museo}/oggetti:
    post:
      summary: Aggiungi un oggetto a un museo
      description: Inserisce un nuovo oggetto in un museo esistente
      parameters:
        - in: path
          name: nome_museo
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - nome
              properties:
                nome:
                  type: string
                stanza:
                  type: string
                connessi:
                  type: array
                  items:
                    type: string
                descrizioni:
                  type: array
                  items:
                    type: array
                    items:
                      type: string
      responses:
        '201':
          description: Oggetto aggiunto
        '400':
          description: Oggetto già esistente o dati mancanti
        '404':
          description: Museo non trovato

  /musei/{nome_museo}/oggetti/{oggetto}:
    get:
      summary: Leggi un oggetto
      description: Ritorna il JSON di un oggetto
      parameters:
        - in: path
          name: nome_museo
          required: true
          schema:
            type: string
        - in: path
          name: oggetto
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Oggetto trovato
          content:
            application/json:
              schema:
                type: object
                properties:
                  nome:
                    type: string
                  stanza:
                    type: string
                  connessi:
                    type: array
                    items:
                      type: string
                  descrizioni:
                    type: array
                    items:
                      type: array
                      items:
                        type: string
        '404':
          description: Oggetto o museo non trovato

    put:
      summary: Aggiorna un oggetto
      description: Modifica un oggetto esistente
      parameters:
        - in: path
          name: nome_museo
          required: true
          schema:
            type: string
        - in: path
          name: oggetto
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                nome:
                  type: string
                stanza:
                  type: string
                connessi:
                  type: array
                  items:
                    type: string
                descrizioni:
                  type: array
                  items:
                    type: array
                    items:
                      type: string
      responses:
        '200':
          description: Oggetto aggiornato
        '404':
          description: Oggetto o museo non trovato

    delete:
      summary: Cancella un oggetto
      description: Rimuove un oggetto da un museo
      parameters:
        - in: path
          name: nome_museo
          required: true
          schema:
            type: string
        - in: path
          name: oggetto
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Oggetto eliminato
        '404':
          description: Oggetto o museo non trovato

  /musei/{nome_museo}/oggetti/{oggetto}/immagini:
    get:
      summary: Lista immagini di un oggetto
      description: >
        Ritorna la lista dei tipi di immagine disponibili per un oggetto.
        Ordine: 'preview' prima, poi i numeri in ordine crescente (1, 2, 3…).
        I dati binari non sono inclusi; usare il singolo endpoint con il tipo per scaricare l'immagine.
      parameters:
        - in: path
          name: nome_museo
          required: true
          schema:
            type: string
          example: "Uffizi"
        - in: path
          name: oggetto
          required: true
          schema:
            type: string
          example: "Venere"
      responses:
        '200':
          description: Lista immagini disponibili
          content:
            application/json:
              schema:
                type: object
                properties:
                  oggetto:
                    type: string
                    example: "Venere"
                  immagini:
                    type: array
                    items:
                      $ref: '#/components/schemas/ImmagineInfo'
        '404':
          description: Museo o oggetto non trovato
        '500':
          description: Errore recupero lista immagini da MongoDB

  /musei/{nome_museo}/oggetti/{oggetto}/immagini/{tipo}:
    get:
      summary: Scarica un'immagine
      description: >
        Restituisce i byte grezzi dell'immagine con il corretto Content-Type.
        Usa 'preview' per l'immagine di anteprima, oppure un numero (1, 2, 3…) per le immagini aggiuntive.
        La risposta include Cache-Control: public, max-age=3600.
      parameters:
        - in: path
          name: nome_museo
          required: true
          schema:
            type: string
          example: "Uffizi"
        - in: path
          name: oggetto
          required: true
          schema:
            type: string
          example: "Venere"
        - in: path
          name: tipo
          required: true
          schema:
            type: string
          description: "'preview' oppure un numero intero (es. '1', '2')"
          example: "preview"
      responses:
        '200':
          description: Immagine restituita come stream binario
          content:
            image/*:
              schema:
                type: string
                format: binary
        '404':
          description: Immagine non trovata
        '500':
          description: Errore recupero immagine da MongoDB

    post:
      summary: Carica o sostituisce un'immagine
      description: >
        Carica una nuova immagine (o sovrascrive quella esistente) per un oggetto del museo.
        Il campo form-data deve chiamarsi **immagine**. Dimensione massima: 10 MB.
        Il tipo può essere 'preview' oppure un numero intero (1, 2, 3…).
        La collection MongoDB usata è `musei.oggetti_immagini`.
        L'_id del documento è nel formato `{nome_museo}_{oggetto}_{tipo}`.
      parameters:
        - in: path
          name: nome_museo
          required: true
          schema:
            type: string
          example: "Uffizi"
        - in: path
          name: oggetto
          required: true
          schema:
            type: string
          example: "Venere"
        - in: path
          name: tipo
          required: true
          schema:
            type: string
          description: "'preview' oppure un numero intero (es. '1', '2')"
          example: "1"
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - immagine
              properties:
                immagine:
                  type: string
                  format: binary
                  description: File immagine da caricare (qualsiasi MIME image/*)
      responses:
        '201':
          description: Immagine salvata con successo
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: _id del documento salvato su MongoDB
                    example: "Uffizi_Venere_preview"
        '400':
          description: Nessun file ricevuto, tipo non valido, o file non immagine
        '404':
          description: Museo o oggetto non trovato
        '500':
          description: Errore salvataggio su MongoDB

    delete:
      summary: Elimina un'immagine
      description: >
        Rimuove un'immagine specifica dalla collection `musei.oggetti_immagini` di MongoDB.
        Non influisce sui dati dell'oggetto o del museo.
      parameters:
        - in: path
          name: nome_museo
          required: true
          schema:
            type: string
          example: "Uffizi"
        - in: path
          name: oggetto
          required: true
          schema:
            type: string
          example: "Venere"
        - in: path
          name: tipo
          required: true
          schema:
            type: string
          description: "'preview' oppure un numero intero (es. '1', '2')"
          example: "preview"
      responses:
        '200':
          description: Immagine eliminata con successo
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Immagine 'preview' eliminata da 'Venere'"
        '404':
          description: Museo non trovato o immagine non trovata
        '500':
          description: Errore eliminazione da MongoDB

  /musei/{nome_museo}/percorso:
    get:
      summary: Percorso BFS tra più oggetti
      description: Calcola il percorso ottimale tra più oggetti specificati tramite BFS sul grafo del museo
      parameters:
        - in: path
          name: nome_museo
          required: true
          schema:
            type: string
        - in: query
          name: oggetti
          required: true
          description: Lista di nomi oggetto separati da virgola (es. "Venere,David,Perseo")
          schema:
            type: string
            example: "Venere,David,Perseo"
      responses:
        '200':
          description: Percorso trovato
          content:
            application/json:
              schema:
                type: object
                properties:
                  percorso:
                    type: array
                    items:
                      type: object
                      properties:
                        nome:
                          type: string
                        stanza:
                          type: string
                        connessi:
                          type: array
                          items:
                            type: string
                        descrizioni:
                          type: array
                          items:
                            type: array
                            items:
                              type: string
        '400':
          description: Parametro oggetti mancante
        '404':
          description: Percorso non trovato o museo non trovato

  /musei/{nome_museo}/percorsi:
    get:
      summary: Lista dei percorsi statici
      description: Ritorna tutti i percorsi statici del museo
      parameters:
        - in: path
          name: nome_museo
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Lista percorsi
          content:
            application/json:
              schema:
                type: object
                properties:
                  percorsi:
                    type: array
                    items:
                      type: object
                      properties:
                        nome:
                          type: string
                        oggetti:
                          type: array
                          items:
                            type: string
        '404':
          description: Museo non trovato

    post:
      summary: Crea un nuovo percorso statico
      description: Aggiunge un percorso statico a un museo. Tutti gli oggetti devono esistere nel museo.
      parameters:
        - in: path
          name: nome_museo
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - nome
                - oggetti
              properties:
                nome:
                  type: string
                  example: "Percorso Rinascimento"
                oggetti:
                  type: array
                  items:
                    type: string
                  example: ["Venere", "David", "Perseo"]
      responses:
        '201':
          description: Percorso creato
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  percorso:
                    type: object
                    properties:
                      nome:
                        type: string
                      oggetti:
                        type: array
                        items:
                          type: string
        '400':
          description: Percorso già esistente o dati non validi
        '404':
          description: Museo non trovato o oggetto non trovato

  /musei/{nome_museo}/percorsi/{nome_percorso}:
    get:
      summary: Dettagli di un percorso statico
      description: Ritorna nome e lista oggetti di un percorso specifico
      parameters:
        - in: path
          name: nome_museo
          required: true
          schema:
            type: string
        - in: path
          name: nome_percorso
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Percorso trovato
          content:
            application/json:
              schema:
                type: object
                properties:
                  nome:
                    type: string
                  oggetti:
                    type: array
                    items:
                      type: string
        '404':
          description: Museo o percorso non trovato

    delete:
      summary: Cancella un percorso statico
      description: Elimina un percorso da un museo
      parameters:
        - in: path
          name: nome_museo
          required: true
          schema:
            type: string
        - in: path
          name: nome_percorso
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Percorso eliminato
        '404':
          description: Museo o percorso non trovato

  /musei/{nome_museo}/layout:
    get:
      summary: Leggi il layout grafico del museo
      description: >
        Ritorna il documento di layout del museo recuperato da MongoDB (collection musei_layout).
        Contiene le informazioni grafiche e posizionali usate per la visualizzazione SVG e la navigazione.
      parameters:
        - in: path
          name: nome_museo
          required: true
          schema:
            type: string
          example: "Uffizi"
      responses:
        '200':
          description: Layout trovato
          content:
            application/json:
              schema:
                type: object
                description: >
                  Documento layout del museo. La struttura esatta dipende dal contenuto
                  di layout.json sincronizzato su MongoDB. Il campo _id corrisponde al nome del museo.
                properties:
                  _id:
                    type: string
                    description: Nome del museo (chiave primaria MongoDB)
                    example: "Uffizi"
                additionalProperties: true
        '404':
          description: Layout non trovato per questo museo
        '500':
          description: Errore di connessione o recupero da MongoDB

    put:
      summary: Aggiorna il layout grafico del museo
      description: >
        Aggiorna il documento di layout nella collection musei_layout di MongoDB.
        Se il layout non esiste viene creato (upsert). I campi inviati nel body
        vengono applicati con $set, quindi è possibile aggiornare solo i campi desiderati.
      parameters:
        - in: path
          name: nome_museo
          required: true
          schema:
            type: string
          example: "Uffizi"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: >
                Campi del layout da aggiornare. La struttura è libera e dipende
                dal formato usato in layout.json.
              additionalProperties: true
              example:
                stanze:
                  - id: "sala1"
                    x: 100
                    y: 200
      responses:
        '200':
          description: Layout aggiornato con successo
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Layout 'Uffizi' aggiornato con successo"
        '400':
          description: Body vuoto o non valido
        '500':
          description: Errore di connessione o aggiornamento su MongoDB

    delete:
      summary: Elimina il layout grafico del museo
      description: >
        Rimuove il documento di layout dalla collection musei_layout di MongoDB.
        Non influisce sui dati del museo (oggetti, percorsi) che risiedono altrove.
      parameters:
        - in: path
          name: nome_museo
          required: true
          schema:
            type: string
          example: "Uffizi"
      responses:
        '200':
          description: Layout eliminato con successo
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Layout 'Uffizi' eliminato con successo"
        '404':
          description: Layout non trovato per questo museo
        '500':
          description: Errore di connessione o eliminazione su MongoDB
